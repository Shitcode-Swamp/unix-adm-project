services:
  backend:
    build: .
    container_name: unix-adm-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ~/:/host
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - backend-internal
    env_file:
      - .env

  mongo:
    image: mongo
    restart: always
    env_file:
      - .env
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-internal
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_NAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    volumes:
      - /home/server/.cloudflared:/home/nonroot/.cloudflared
    networks:
      - backend-internal
    depends_on:
      - backend

networks:
  backend-internal:

volumes:
  mongo-data: